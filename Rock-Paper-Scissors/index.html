<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>
    <div class="options">
        <div class="option" id="Rock">
            <img src="Assets/Rock.jpg" alt="">
        </div>
        <div class="option" id ="Paper">
            <img src="Assets/Paper.jpg" alt="">
        </div>
        <div class="option" id ="Scissors">
            <img src="Assets/Scissors.jpg" alt="">
        </div>
    </div>

    <div class="score">
        <div class="player1">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="player2">
            <p id="computer-score">0</p>
            <p>Computer</p>
        </div>
    </div>

    <div class="msg-container">
        <p class="message">Make your move</p>
    </div>
    <script src="main.js"></script>
</body>
</html>
