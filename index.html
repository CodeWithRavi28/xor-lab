<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
            background: linear-gradient(135deg, #f4f4f4, #d9e9f2);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .links {
            width: min(92vw, 520px);
            display: grid;
            gap: 0.8rem;
        }

        .links a {
            display: block;
            text-decoration: none;
            background: #ffffff;
            color: #1a1a1a;
            border-radius: 12px;
            padding: 0.9rem 1rem;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            font-weight: 600;
        }

        .links a:hover {
            transform: translateY(-1px);
        }

        @media (max-width: 767px) {
            .links a {
                font-size: 0.95rem;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .links a {
                font-size: 1rem;
            }
        }

        @media (min-width: 1024px) {
            .links a {
                font-size: 1.06rem;
            }
        }
    </style>
</head>
<body>
    <div class="links">
        <a href="/netflix/index.html">Netflix</a>
        <a href="/Rock-Paper-Scissors/index.html">Rock-Paper-Scissors</a>
        <a href="/Tick-Tack-Toe%20Game/index.html">Tick Tack Toe</a>
    </div>
</body>
</html>
